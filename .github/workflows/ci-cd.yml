name: TTSoft ERP — CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIG:   'Release'

jobs:
  # ── Job 1: Build e Testes ─────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-latest   # WPF exige Windows

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remover Mobile do Build (economiza tempo de CI)
        run: dotnet sln ERP.sln remove ERP.Mobile/ERP.Mobile.csproj

      - name: 📦 Restore dependências
        run: dotnet restore ERP.sln -p:CheckEolWorkloads=false

      - name: 🔨 Build — Domain, Application, Infrastructure, Persistence
        run: |
          dotnet build ERP.Domain\ERP.Domain.csproj                 -c ${{ env.BUILD_CONFIG }} --no-restore
          dotnet build ERP.Application\ERP.Application.csproj       -c ${{ env.BUILD_CONFIG }} --no-restore
          dotnet build ERP.Infrastructure\ERP.Infrastructure.csproj  -c ${{ env.BUILD_CONFIG }} --no-restore
          dotnet build ERP.Persistence\ERP.Persistence.csproj        -c ${{ env.BUILD_CONFIG }} --no-restore

      - name: 🔨 Build — API
        run: dotnet build ERP.Api\ERP.Api.csproj -c ${{ env.BUILD_CONFIG }} --no-restore

      - name: 🔨 Build — Portal
        run: dotnet build ERP.Portal\ERP.Portal.csproj -c ${{ env.BUILD_CONFIG }} --no-restore

      - name: 🔨 Build — WPF
        run: dotnet build ERP.WPF\ERP.WPF.csproj -c ${{ env.BUILD_CONFIG }} --no-restore

      # ── FASE 0 — Gate obrigatório de isolamento multi-tenant ─────────────────
      # Estes 3 testes provam que:
      #   #1 Produto do Tenant A não vaza para Tenant B
      #   #2 Produto do Tenant A aparece corretamente para Tenant A
      #   #3 Saldo Haver do Tenant A não vaza para Tenant B
      # Qualquer PR que quebre o isolamento falha aqui e não avança para deploy.
      - name: 🔒 Fase 0 — Testes de isolamento multi-tenant (gate obrigatório)
        run: dotnet test ERP.Tests\ERP.Tests.csproj --filter "FASE0" --no-restore --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # ── Suíte completa de testes ──────────────────────────────────────────────
      - name: 🧪 Todos os testes
        run: dotnet test ERP.Tests\ERP.Tests.csproj --no-restore --verbosity normal --logger "trx;LogFileName=results.trx"
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      - name: 📊 Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: '**/TestResults/*.trx'
          retention-days: 14

  # ── Job 2: Publish WPF (apenas na main) ──────────────────────────────────────
  publish-wpf:
    name: Publish WPF Installer
    needs: build-and-test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore ERP.WPF\ERP.WPF.csproj

      - name: 🚀 Publish WPF
        run: |
          dotnet publish ERP.WPF\ERP.WPF.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o publish/loja

      - name: 📤 Upload artefato WPF
        uses: actions/upload-artifact@v4
        with:
          name: ERP-WPF-${{ github.sha }}
          path: publish/loja/
          retention-days: 30

  # ── Job 3: Deploy Portal (apenas na main) ────────────────────────────────────
  deploy-portal:
    name: Deploy Portal → Azure Static Web Apps
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy → Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "ERP.Portal"
          output_location: "wwwroot"

  # ── Job 4: Deploy API → Azure App Service (apenas na main) ───────────────────
  deploy-api:
    name: Deploy API → Azure App Service
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore API
        run: dotnet restore ERP.Api/ERP.Api.csproj

      - name: 🔨 Publish API
        run: |
          dotnet publish ERP.Api/ERP.Api.csproj \
            -c Release -r linux-x64 --self-contained false \
            -o publish/api

      - name: 🚀 Deploy → Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: erp-ttsoft-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: publish/api