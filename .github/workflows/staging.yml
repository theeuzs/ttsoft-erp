name: TTSoft ERP — Staging

on:
  push:
    branches: [ develop ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ── Build e Testes ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Staging)
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remove Mobile do build
        run: dotnet sln ERP.sln remove ERP.Mobile/ERP.Mobile.csproj

      - name: 📦 Restore
        run: dotnet restore ERP.sln -p:CheckEolWorkloads=false

      - name: 🔨 Build solução completa
        run: dotnet build ERP.sln -c Release --no-restore

      - name: 🧪 Testes de Integração
        run: dotnet test ERP.Tests\ERP.Tests.csproj --no-restore --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          ASPNETCORE_ENVIRONMENT: Staging

      - name: 📊 Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-staging-${{ github.sha }}
          path: '**/TestResults/*.xml'
          retention-days: 7

  # ── Deploy API → Slot Staging ─────────────────────────────────────────────────
  deploy-api-staging:
    name: Deploy API → Staging Slot
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore API
        run: dotnet restore ERP.Api/ERP.Api.csproj

      - name: 🔨 Publish API (Staging)
        run: |
          dotnet publish ERP.Api/ERP.Api.csproj \
            -c Release -r linux-x64 --self-contained false \
            -p:EnvironmentName=Staging \
            -o publish/api-staging

      - name: 🚀 Deploy → Azure App Service (Staging Slot)
        uses: azure/webapps-deploy@v3
        with:
          app-name: erp-ttsoft-api
          slot-name: staging                          # ← slot separado, não afeta produção
          publish-profile: ${{ secrets.AZURE_API_STAGING_PUBLISH_PROFILE }}
          package: publish/api-staging

      - name: 💬 Comentar PR com URL de staging
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Deploy de Staging concluído!**\n\n' +
                    '**API Staging:** https://erp-ttsoft-api-staging.azurewebsites.net\n' +
                    '**Portal Staging:** https://red-rock-0d2fb150f7-staging.azurestaticapps.net\n\n' +
                    `Commit: \`${context.sha.substring(0,7)}\``
            })

  # ── Deploy Portal → Staging ───────────────────────────────────────────────────
  deploy-portal-staging:
    name: Deploy Portal → Staging
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy → Azure Static Web Apps (Staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "ERP.Portal"
          output_location: "wwwroot"
          deployment_environment: staging             # ← ambiente separado do produção
